<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Curve Shortening Flow — Student Version</title>

  <link rel="stylesheet" href="style.css">

  <script type="module" src="build/bundle.min.mjs"></script>
  <script nomodule src="build/bundle.min.js"></script>
</head>

<body>
  <csf-app id="app"></csf-app>

  <section id="student-presets" aria-label="Preset polygon controls">
    <h1>Preset shapes</h1>

    <p class="hint">
      Choose a polygon, or type vertices as <code>x,y</code> pairs.
      Coordinates from about <code>-1</code> to <code>1</code> work well.
      The polygon is closed automatically.
    </p>

    <p>
      <button type="button" data-vertices="-1,-0.8 1,-0.8 0,0.9">
        Triangle
      </button>

      <button type="button" data-vertices="-1,-1 1,-1 1,1 -1,1">
        Square
      </button>

      <button type="button" data-vertices="-1,0 0,-1 1,0 0,1">
        Diamond
      </button>

      <button type="button" data-vertices="0,1 0.95,0.31 0.59,-0.81 -0.59,-0.81 -0.95,0.31">
        Pentagon
      </button>

      <button type="button" data-vertices="1,0 0.5,0.866 -0.5,0.866 -1,0 -0.5,-0.866 0.5,-0.866">
        Hexagon
      </button>

      <button type="button" data-vertices="0,1 0.22,0.31 0.95,0.31 0.36,-0.12 0.59,-0.81 0,-0.38 -0.59,-0.81 -0.36,-0.12 -0.95,0.31 -0.22,0.31">
        Star
      </button>
    </p>

    <p class="hint">
      Custom example:
      <code>-1,-1 1,-1 1,1 -1,1</code>
    </p>

    <textarea id="vertexInput" spellcheck="false">-1,-1 1,-1 1,1 -1,1</textarea>

    <p>
      <button type="button" id="loadCustomShape">
        Load custom vertices
      </button>
    </p>
  </section>

  <script>
  (function () {
    "use strict";

    var PRESET_ID = "__preset_shape__";

    function parseVertices(text) {
      return text
        .trim()
        .replace(/[;\n]+/g, " ")
        .split(/\s+/)
        .filter(Boolean)
        .map(function (pair) {
          var cleaned = pair.replace(/[()]/g, "");
          var xy = cleaned.split(",").map(Number);

          if (
            xy.length !== 2 ||
            !Number.isFinite(xy[0]) ||
            !Number.isFinite(xy[1])
          ) {
            throw new Error("Bad vertex: " + pair);
          }

          return xy;
        });
    }

    function withReadyApp(callback) {
      var app = document.getElementById("app");

      if (
        !app ||
        !app.canvas ||
        !app.touchPaths ||
        typeof app.touchEnd !== "function"
      ) {
        requestAnimationFrame(function () {
          withReadyApp(callback);
        });
        return;
      }

      callback(app);
    }

    function makeScreenPath(vertices, app) {
      var canvas = app.canvas;
      var scale = 0.42 * Math.min(canvas.width, canvas.height);
      var cx = canvas.width / 2;
      var cy = canvas.height / 2;
      var seglength = Math.max(2, app.seglength || 5);

      var screenVertices = vertices.map(function (v) {
        return [
          cx + v[0] * scale,
          cy - v[1] * scale
        ];
      });

      var path = [];

      for (var i = 0; i < screenVertices.length; i++) {
        var a = screenVertices[i];
        var b = screenVertices[(i + 1) % screenVertices.length];

        var dx = b[0] - a[0];
        var dy = b[1] - a[1];
        var length = Math.hypot(dx, dy);
        var steps = Math.max(2, Math.ceil(length / seglength));

        for (var j = 0; j < steps; j++) {
          path.push([
            a[0] + dx * j / steps,
            a[1] + dy * j / steps
          ]);
        }
      }

      return path;
    }

    window.loadPresetVertices = function (text) {
      var vertices;

      try {
        vertices = parseVertices(text);
      } catch (err) {
        alert(err.message);
        return;
      }

      if (vertices.length < 3) {
        alert("Please enter at least three vertices.");
        return;
      }

      withReadyApp(function (app) {
        app.curves = [];
        app.touchPaths.clear();

        var path = makeScreenPath(vertices, app);

        /*
          Use the app's existing curve-creation method. This keeps the
          original simulation code intact while allowing preset polygons.
        */
        app.touchPaths.set(PRESET_ID, path);
        app.touchEnd({ identifier: PRESET_ID });

        app.paused = false;
      });
    };

    document.addEventListener("click", function (event) {
      var button = event.target.closest("[data-vertices]");

      if (!button) {
        return;
      }

      window.loadPresetVertices(button.getAttribute("data-vertices"));
    });

    document.getElementById("loadCustomShape").addEventListener("click", function () {
      window.loadPresetVertices(document.getElementById("vertexInput").value);
    });

    if (window.customElements && customElements.whenDefined) {
      customElements.whenDefined("csf-app").then(function () {
        window.loadPresetVertices(document.getElementById("vertexInput").value);
      });
    }
  })();
  </script>
</body>
</html>
